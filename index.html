<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>《易经》教你过好每一天 · 晓晓老师互动课</title>
<style>
  :root{
    --paper:#fbf6ec; --ink:#2b2b2b; --board:#fffdf7; --accent:#c0392b;
    --gold:#b8860b; --soft:#f0e6d2; --line:#e2d4b7;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"SimSun","宋体",STSong,serif;
    background:radial-gradient(circle at 30% 0%, #fff8ec 0%, var(--paper) 60%, #f3e9d4 100%);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  header{
    text-align:center;padding:18px 16px 10px;border-bottom:3px double var(--line);
    background:linear-gradient(180deg,#fffdf7,#fbf6ec);
  }
  header h1{margin:0;font-size:24px;color:var(--accent);letter-spacing:2px;}
  header .sub{margin-top:4px;font-size:15px;color:#7a6a4a;}

  /* 课次切换栏 */
  .switchbar{max-width:900px;margin:12px auto 0;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;padding:0 12px;}
  .switchbar .lbl{font-size:13px;color:#7a6a4a;margin-right:2px;}
  .switchbar .lbtn{font-family:inherit;cursor:pointer;border:1px solid var(--gold);background:#fff;
    color:var(--accent);border-radius:20px;padding:6px 14px;font-size:14px;transition:.15s;}
  .switchbar .lbtn:hover{background:var(--gold);color:#fff;}
  .switchbar .lbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:bold;}

  .progress-wrap{max-width:760px;margin:10px auto 0;}
  .progress-bar{height:8px;background:var(--soft);border-radius:6px;overflow:hidden;}
  .progress-bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--accent));transition:width .25s;}
  .progress-txt{font-size:13px;color:#8a7a5a;margin-top:4px;}

  main{max-width:820px;margin:18px auto 150px;padding:0 16px;}
  .card{
    background:var(--board);border:1px solid var(--line);border-radius:14px;
    box-shadow:0 6px 20px rgba(120,90,40,.10);padding:28px 30px;min-height:250px;
  }
  .seg-tag{display:inline-block;font-size:13px;color:#fff;background:var(--gold);
    padding:2px 10px;border-radius:10px;margin-bottom:12px;}
  .seg-tag.quiz{background:var(--accent);}
  .board-text{font-size:18px;line-height:2.0;color:var(--ink);white-space:pre-wrap;}
  .board-text .em{color:var(--accent);font-weight:bold;}

  .diagram{margin:4px 0 16px;text-align:center;}
  .diagram svg{max-width:360px;height:auto;display:block;margin:0 auto;}

  .quiz-q{font-size:20px;line-height:1.9;color:#1d3b6e;font-weight:bold;}
  .quiz-box{margin-top:18px;border-top:1px dashed var(--line);padding-top:16px;}
  .btn{
    font-family:inherit;cursor:pointer;border:1px solid var(--gold);background:#fff;
    color:var(--accent);border-radius:10px;padding:9px 16px;font-size:15px;margin:6px 8px 6px 0;
    transition:.15s;
  }
  .btn:hover{background:var(--gold);color:#fff;}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.primary:hover{background:#a93226;}
  .reveal{margin-top:14px;padding:14px 16px;border-radius:10px;background:#f7f1e1;
    border-left:4px solid var(--gold);display:none;}
  .reveal.show{display:block;}
  .reveal .who{font-weight:bold;color:var(--accent);}
  .reveal.stu .who{color:#1d7a4a;}
  .复述-label{display:block;margin:16px 0 6px;font-size:14px;color:#7a6a4a;}
  textarea{width:100%;min-height:84px;font-family:inherit;font-size:15px;
    border:1px solid var(--line);border-radius:10px;padding:10px;background:#fffdf7;resize:vertical;}

  #panel{
    position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
    width:min(720px,94vw);background:rgba(255,253,247,.97);
    border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 28px rgba(90,60,20,.22);
    z-index:50;overflow:hidden;
  }
  #panel .phandle{
    cursor:move;background:linear-gradient(90deg,var(--gold),#e0a93b);
    color:#fff;font-size:13px;padding:6px 12px;display:flex;justify-content:space-between;align-items:center;
  }
  #panel .phandle .hint{font-size:11px;opacity:.85;}
  #sub{font-size:16px;line-height:1.7;padding:10px 14px 4px;color:var(--ink);min-height:24px;}
  .ctrls{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:6px 14px 12px;}
  .ctrls button{font-family:inherit;cursor:pointer;border:1px solid var(--gold);
    background:#fff;color:var(--accent);border-radius:9px;padding:7px 12px;font-size:15px;}
  .ctrls button:hover{background:var(--gold);color:#fff;}
  .ctrls .play{background:var(--accent);color:#fff;border-color:var(--accent);min-width:46px;}
  .ctrls .play:hover{background:#a93226;}
  #seek{flex:1;min-width:140px;height:6px;accent-color:var(--accent);}
  .ctrls select{font-family:inherit;font-size:14px;padding:5px 6px;border-radius:8px;border:1px solid var(--line);}
  .ctrls label{font-size:13px;color:#7a6a4a;display:flex;align-items:center;gap:4px;}
  .ctrls .fs{font-size:14px;padding:5px 9px;}

  .mantra{margin-top:30px;background:#fffdf7;border:1px dashed var(--gold);border-radius:12px;padding:18px 22px;}
  .mantra h3{margin:0 0 10px;color:var(--accent);font-size:18px;}
  .mantra li{font-size:15px;line-height:1.9;margin:4px 0;}
  footer{text-align:center;color:#9a8a6a;font-size:12px;padding:14px;}

  /* 图鉴按钮 + 弹窗 */
  #btnGallery{position:fixed;top:12px;right:14px;z-index:60;cursor:pointer;
    border:1px solid var(--gold);background:#fff;color:var(--accent);border-radius:10px;
    padding:8px 12px;font-size:14px;font-family:inherit;box-shadow:0 4px 12px rgba(90,60,20,.18);}
  #btnGallery:hover{background:var(--gold);color:#fff;}
  .overlay{position:fixed;inset:0;background:rgba(40,30,15,.55);display:none;z-index:80;
    align-items:center;justify-content:center;}
  .overlay.show{display:flex;}
  .gpanel{background:var(--board);border:1px solid var(--line);border-radius:14px;
    width:min(880px,94vw);max-height:88vh;display:flex;flex-direction:column;
    box-shadow:0 12px 40px rgba(80,50,10,.35);}
  .ghead{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;
    border-bottom:1px solid var(--line);font-size:16px;color:var(--accent);}
  .ghead button{cursor:pointer;border:1px solid var(--gold);background:#fff;color:var(--accent);
    border-radius:9px;padding:6px 12px;font-size:14px;font-family:inherit;}
  .ghead button:hover{background:var(--gold);color:#fff;}
  .gbody{padding:16px;overflow:auto;display:flex;flex-direction:column;gap:22px;}
  .gitem{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .gitem svg{max-width:100%;height:auto;display:block;margin:0 auto;}
  .gitem .cap{margin-top:10px;font-size:14px;color:#5a4a2a;text-align:center;line-height:1.7;}
</style>
</head>
<body>
<header>
  <h1 id="title">《易经》教你过好每一天</h1>
  <div class="sub" id="subtitle"></div>
  <div class="switchbar" id="switchBar"><span class="lbl">📚 选课：</span></div>
  <div class="progress-wrap">
    <div class="progress-bar"><i id="pbar"></i></div>
    <div class="progress-txt" id="ptxt">第 1 / 1 句</div>
  </div>
</header>

<button id="btnGallery">🖼️ 图鉴</button>

<main>
  <div class="card" id="card"></div>

  <div class="mantra">
    <h3>📜 本课口诀（建议背诵）</h3>
    <ol id="mantraList"></ol>
  </div>
  <footer>晓晓老师主讲 · 结合曾仕强《易经》心得 · 费曼互动课堂 · 用耳朵学，用嘴讲，记得牢</footer>
</main>

<!-- 可拖动字幕/控制条 -->
<div id="panel">
  <div class="phandle" id="handle">
    <span>🎧 字幕 / 播放控制（拖动我可移开，不挡讲解）</span>
    <span class="hint">⊙ 可拖动</span>
  </div>
  <div id="sub">准备好就开始吧～</div>
  <div class="ctrls">
    <button class="play" id="btnPlay" title="播放/暂停">▶</button>
    <button id="btnPrev" title="上一句">⏮ 上一句</button>
    <button id="btnNext" title="下一句">下一句 ⏭</button>
    <input type="range" id="seek" min="0" max="1000" value="0">
    <label>语速
      <select id="speed">
        <option value="0.8">0.8×</option>
        <option value="1" selected>1.0×</option>
        <option value="1.15">1.15×</option>
        <option value="1.3">1.3×</option>
      </select>
    </label>
    <label><input type="checkbox" id="auto" checked> 自动连播</label>
    <button class="fs" id="fsDown" title="字号变小">A-</button>
    <button class="fs" id="fsUp" title="字号变大">A+</button>
  </div>
</div>

<!-- 图鉴弹窗 -->
<div id="gallery" class="overlay">
  <div class="gpanel">
    <div class="ghead"><span>🖼️ 本课图鉴（慢慢看，点开不枯燥）</span><button id="gClose">✕ 关闭</button></div>
    <div class="gbody" id="gbody"></div>
  </div>
</div>

<script>
const BUILD = "20260719b";   // 部署版本戳：更新网页或课程后改此值以刷新浏览器缓存
let DATA, segs, DIAG, CAPS, N, idx = 0;
let autoplay = true, speed = 1.0, fontSize = 20;
const audio = new Audio();
audio.preload = "auto";

const $ = id => document.getElementById(id);

function applyFont(){
  document.querySelectorAll(".board-text,.quiz-q").forEach(e=>e.style.fontSize=fontSize+"px");
}

function highlight(text){
  return text.replace(/(“[^”]*”|《[^》]*》|【[^】]*】)/g, '<span class="em">$1</span>');
}

function render(){
  const seg = segs[idx];
  $("pbar").style.width = ((idx+1)/N*100).toFixed(1)+"%";
  $("ptxt").textContent = `第 ${idx+1} / ${N} 句` + (seg.k==="quiz" ? " （课堂提问）" : "");

  const card = $("card");
  if (seg.k === "say"){
    const diag = (seg.diagram && DIAG[seg.diagram]) ? `<div class="diagram">${DIAG[seg.diagram]}</div>` : "";
    card.innerHTML =
      `<span class="seg-tag">讲解</span>` +
      diag +
      `<div class="board-text">${highlight(seg.t)}</div>`;
    $("sub").textContent = seg.t;
  } else {
    card.innerHTML =
      `<span class="seg-tag quiz">课堂提问 · 费曼互动</span>` +
      `<div class="quiz-q">❓ ${seg.q}</div>` +
      `<div class="quiz-box">
         <button class="btn primary" id="bAns">显示同学回答 ▶</button>
         <button class="btn" id="bCmt">听老师点评 ▶</button>
         <div class="reveal stu" id="rAns"><span class="who">同学：</span>${seg.a}</div>
         <div class="reveal" id="rCmt"><span class="who">晓晓老师：</span>${seg.c}</div>
         <span class="复述-label">✍️ 费曼自测：用自己的话把这道题讲一遍（讲出来才真懂）：</span>
         <textarea placeholder="在这里打出来，或者大声说出来～"></textarea>
         <button class="btn" id="bNext2">我讲完了，下一句 ⏭</button>
       </div>`;
    $("sub").textContent = "❓ " + seg.q;
    // 同学回答：若本段无语音(早期课)，仅显示文字不播放
    $("bAns").onclick = () => {
      $("rAns").classList.add("show");
      if (seg.audio.ans) playSrc(seg.audio.ans);
    };
    $("bCmt").onclick = () => { $("rCmt").classList.add("show"); playSrc(seg.audio.cmt); };
    $("bNext2").onclick = () => go(idx+1, true);
  }
  applyFont();
  if (seg.k === "say"){ if (autoplay) playSrc(seg.audio); }
  else { playSrc(seg.audio.ask); }
}

function go(i, doPlay){
  i = Math.max(0, Math.min(N-1, i));
  idx = i;
  render();
}

function playSrc(src){
  if (!src){ return; }
  audio.playbackRate = speed;
  if (audio.src !== src){
    // 关键修复：换新源后不要再手动设 currentTime。
    // 新源尚未加载(readyState=0)时设 currentTime 会抛 InvalidStateError，
    // 导致后面的 audio.play() 永远不执行（表现为只能放第一句/整页没声音）。
    // 浏览器赋值新 src 后会自动把 currentTime 归零，无需手动重置。
    audio.src = src;
  } else {
    // 同一句重复播放：从头开始（已加载，可安全重置）
    try { audio.currentTime = 0; } catch(e){}
  }
  // 浏览器自动播放策略：若尚无用户交互，play() 会被拒绝，这里静默忽略；
  // 用户在页面上点一下(▶ 或任意处)后即会正常连播。
  audio.play().catch(()=>{});
}
function setPlayIcon(){ $("btnPlay").textContent = audio.paused ? "▶" : "⏸"; }
audio.addEventListener("play", setPlayIcon);
audio.addEventListener("pause", setPlayIcon);

audio.addEventListener("timeupdate", () => {
  if (audio.duration) $("seek").value = Math.round(audio.currentTime/audio.duration*1000);
});
audio.addEventListener("ended", () => {
  const seg = segs[idx];
  if (seg.k === "say" && autoplay) go(idx+1, true);
});

// ---- 加载某一课 ----
const LESSON_MAP = {};   // n -> data 对象（全部课并存，切换即时）

function loadLessonFile(n, done){
  const s = document.createElement("script");
  s.src = `lesson_data_${n}.js?v=${BUILD}`;
  s.onload = () => { LESSON_MAP[n] = window.LESSON_DATA; done(true); };
  s.onerror = () => done(false);
  document.head.appendChild(s);
}

function loadLesson(d){
  DATA = d;
  segs = d.segments;
  DIAG = d.diagrams || {};
  CAPS = d.captions || {};
  N = segs.length;
  idx = 0;
  audio.pause();

  $("title").textContent = d.meta.title;
  $("subtitle").textContent = d.meta.subtitle;

  // 口诀列表
  const ml = $("mantraList");
  ml.innerHTML = "";
  (d.mantra||[]).forEach(m => { const li=document.createElement("li"); li.textContent=m; ml.appendChild(li); });

  // 图鉴
  const g = $("gbody");
  g.innerHTML = "";
  Object.keys(DIAG).forEach(k=>{
    const item=document.createElement("div");
    item.className="gitem";
    item.innerHTML = DIAG[k] + `<div class="cap">${CAPS[k]||""}</div>`;
    g.appendChild(item);
  });

  render();
}

function showLesson(n){
  if (LESSON_MAP[n]){
    loadLesson(LESSON_MAP[n]);
    highlightBtn(n);
    window.scrollTo(0,0);
  }
}

function buildBtn(n){
  const b = document.createElement("button");
  b.className = "lbtn";
  b.textContent = "第"+n+"课";
  b.dataset.n = n;
  b.onclick = () => showLesson(n);
  $("switchBar").appendChild(b);
}
function highlightBtn(n){
  document.querySelectorAll("#switchBar .lbtn").forEach(x=>{
    x.classList.toggle("active", (+x.dataset.n) === n);
  });
}

// ---- 启动：从 第1课 起动态探测，直到 404 停止 ----
(function init(){
  let n = 1, order = [];
  (function next(){
    loadLessonFile(n, ok => {
      if (ok){
        buildBtn(n);
        order.push(n);
        n++;
        next();
      } else {
        if (order.length){
          // 默认显示最新（探测到的最后一课）
          showLesson(order[order.length-1]);
        } else {
          $("card").innerHTML = '<span class="seg-tag">提示</span><div class="board-text">没有找到课程数据，请确认 lesson_data_1.js 等文件已部署到同一目录。</div>';
        }
      }
    });
  })();
})();

// ---- 控件绑定（全局一次）----
$("btnPlay").onclick = () => { if (audio.paused) audio.play().catch(()=>{}); else audio.pause(); };
$("btnPrev").onclick = () => go(idx-1, true);
$("btnNext").onclick = () => go(idx+1, true);
$("seek").oninput = e => { if (audio.duration) audio.currentTime = e.target.value/1000*audio.duration; };
$("speed").onchange = e => { speed = parseFloat(e.target.value); audio.playbackRate = speed; };
$("auto").onchange = e => autoplay = e.target.checked;
$("fsUp").onclick = () => { fontSize=Math.min(30,fontSize+2); applyFont(); };
$("fsDown").onclick = () => { fontSize=Math.max(16,fontSize-2); applyFont(); };

$("btnGallery").onclick = () => $("gallery").classList.add("show");
$("gClose").onclick = () => $("gallery").classList.remove("show");
$("gallery").onclick = e => { if(e.target===$("gallery")) $("gallery").classList.remove("show"); };

document.addEventListener("keydown", e=>{
  if (e.target.tagName==="TEXTAREA") return;
  if (e.target.id==="seek") return;
  if (e.key==="ArrowRight") go(idx+1,true);
  else if (e.key==="ArrowLeft") go(idx-1,true);
  else if (e.key===" "){ e.preventDefault(); $("btnPlay").click(); }
});

// 首次用户交互即解锁播放（满足浏览器自动播放策略）：
// 点页面任意处(非控制条)或按任意键，若还没播放就自动开始当前句，之后整页连播。
let kicked=false;
function maybeKick(e){
  if (kicked) return;
  if (e.target && e.target.closest && e.target.closest("#panel")) return; // 控制条交给各自按钮
  kicked=true;
  if (audio.paused) audio.play().catch(()=>{});
}
document.addEventListener("pointerdown", maybeKick);
document.addEventListener("keydown", maybeKick);

// 拖动面板（不挡讲解，可放任意位置）
(function(){
  const panel=$("panel"), handle=$("handle");
  let dx=0, dy=0, dragging=false;
  handle.addEventListener("pointerdown", e=>{
    dragging=true; panel.style.transform="none";
    const r=panel.getBoundingClientRect();
    dx=e.clientX-r.left; dy=e.clientY-r.top;
    handle.setPointerCapture(e.pointerId);
  });
  handle.addEventListener("pointermove", e=>{
    if(!dragging) return;
    let x=e.clientX-dx, y=e.clientY-dy;
    x=Math.max(4,Math.min(window.innerWidth-panel.offsetWidth-4,x));
    y=Math.max(4,Math.min(window.innerHeight-60,y));
    panel.style.left=x+"px"; panel.style.top=y+"px"; panel.style.bottom="auto";
  });
  handle.addEventListener("pointerup", ()=> dragging=false);
})();
</script>
</body>
</html>
